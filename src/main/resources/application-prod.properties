server.port=9006
server.servlet.context-path=/elearningapi

# SMTP réel (utiliser variables d’environnement)
spring.mail.host=${MAIL_HOST:smtp.turbo-smtp.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.turbo-smtp.com}

# From et base URL frontend
app.mail.from=${MAIL_FROM:Programme Leadership <NePasRepondre_noReply@programmeleadership.net>}
app.frontend.base-url=${FRONTEND_BASE_URL:https://programmeleadership.org}

# Médias (sur le serveur : exporter VIDEO_DIRECTORY vers le chemin des fichiers vidéo)
app.media.video-directory=${VIDEO_DIRECTORY:D:/dimanche/iri/Api/videos}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true

spring.jpa.hibernate.ddl-auto=none

